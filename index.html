<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人网站</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      background-color: #1E1E1E;
      background-image: url('./'); /* 你可以换成背景图片路径 */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .glass {
      position: absolute;
      top: 35px;
      bottom: 35px;
      left: 50px;
      right: 50px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 35px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column; /* 让导航栏在上，内容在下 */
    }
    nav {
      display: flex;
      justify-content: center;
      padding: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    nav a {
      margin: 0 20px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      font-size: 18px;
      transition: color 0.3s;
    }
    nav a:hover {
      color: #4CAF50; /* 悬停变绿色 */
    }
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    section {
      margin: 50px 0;
    }
  </style>
</head>
<body>
  <div class="glass">
    <!-- 顶部导航栏 -->
    <nav>
      <a href="#about">About Me</a>
      <a href="#project">Project</a>
      <a href="#contact">Contact</a>
    </nav>

    <!-- 页面主要内容 -->
    <div class="content">
      <div>
        <section id="about">
          <h1>欢迎来到我的个人网站</h1>
          <p>这里是 About Me 的介绍内容。</p>
        </section>

        <section id="project">
          <h2>项目展示</h2>
          <p>这里可以放你的项目列表，比如在线考试系统、个人网站、RateMyProfessor 应用等。</p>
        </section>

        <section id="contact">
          <h2>联系方式</h2>
          <p>邮箱: yourname@email.com | GitHub | LinkedIn</p>
        </section>
      </div>
    </div>
  </div>

  <script>
    // 平滑滚动效果
    document.querySelectorAll('nav a').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        document.querySelector(this.getAttribute('href'))
          .scrollIntoView({ behavior: 'smooth' });
      });
    });
  </script>
</body>
</html>
