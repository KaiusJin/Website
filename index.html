<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人网站</title>
  <!-- Font Awesome 图标库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      background-color: #1E1E1E;
      background-image: url('./'); /* 可以换成背景图 */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .glass {
      position: absolute;
      top: 35px;
      bottom: 35px;
      left: 50px;
      right: 50px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 35px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    nav {
      display: flex;
      justify-content: center;
      padding: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    nav a {
      margin: 0 20px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.3s;
    }
    nav a:hover, nav a.active {
      color: #4CAF50;
    }
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    section {
      display: none; /* 默认隐藏 */
      width: 100%;
    }
    section.active {
      display: block; /* 激活的显示 */
    }
    /* Contact 页面样式 */
    .contact-container {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
      max-width: 400px;
      margin: auto;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 18px;
    }
    .contact-item i {
      font-size: 22px;
      color: #4CAF50;
      width: 30px;
      text-align: center;
    }
    .contact-item a {
      color: #fff;
      text-decoration: none;
    }
    .contact-item a:hover {
      text-decoration: underline;
      color: #4CAF50;
    }
  </style>
</head>
<body>
  <div class="glass">
    <!-- 顶部导航栏 -->
    <nav>
      <a class="active" data-page="about">About Me</a>
      <a data-page="project">Project</a>
      <a data-page="contact">Contact</a>
    </nav>

    <!-- 页面内容 -->
    <div class="content">
      <section id="about" class="active">
        <h1>欢迎来到我的个人网站</h1>
        <p>这里是 About Me 的介绍内容。</p>
      </section>

      <section id="project">
        <h2>项目展示</h2>
        <p>这里可以放你的项目列表，比如在线考试系统、个人网站、RateMyProfessor 应用等。</p>
      </section>

      <section id="contact">
        <h2>联系方式</h2>
        <div class="contact-container">
          <div class="contact-item">
            <i class="fas fa-phone"></i>
            <span>+1 (123) 456-7890</span>
          </div>
          <div class="contact-item">
            <i class="fas fa-envelope"></i>
            <a href="mailto:yourname@email.com">yourname@email.com</a>
          </div>
          <div class="contact-item">
            <i class="fab fa-linkedin"></i>
            <a href="https://www.linkedin.com/in/yourusername/" target="_blank">LinkedIn</a>
          </div>
          <div class="contact-item">
            <i class="fab fa-github"></i>
            <a href="https://github.com/yourusername" target="_blank">GitHub</a>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    // Tab 切换逻辑
    const navLinks = document.querySelectorAll('nav a');
    const sections = document.querySelectorAll('section');

    navLinks.forEach(link => {
      link.addEventListener('click', () => {
        // 去掉所有 active
        navLinks.forEach(l => l.classList.remove('active'));
        sections.forEach(s => s.classList.remove('active'));

        // 激活当前
        link.classList.add('active');
        document.getElementById(link.dataset.page).classList.add('active');
      });
    });
  </script>
</body>
</html>
