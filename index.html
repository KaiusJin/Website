<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人网站</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      background-color: #1E1E1E; /* 深色背景 */
      background-image: url('./'); /* 可以换成你的背景图片路径 */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .glass {
      position: absolute;
      top: 35px;
      bottom: 35px;
      left: 50px;
      right: 50px;
      background: rgba(255, 255, 255, 0.1); /* 调浅，让深色背景透出来 */
      border-radius: 35px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2); /* 加一层边框，更精致 */
    }
    .content {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      font-family: sans-serif;
      color: #fff; /* 白色文字适配深色背景 */
    }
  </style>
</head>
<body>
  <div class="glass">
    <div class="content">
      <h1>欢迎来到我的个人网站</h1>
    </div>
  </div>
</body>
</html>
