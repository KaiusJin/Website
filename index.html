<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Website</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <script>
    (function(){
      emailjs.init("Weh_j8K9Bgk4BrZFl"); // ⚡ 你的 EmailJS 用户ID
    })();
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background-color: #1E1E1E;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      color: #fff;
    }
    .glass {
      margin: 20px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 35px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      width: calc(100% - 40px);
      max-width: 1200px;
      min-height: 90vh;
      box-sizing: border-box;
      overflow: hidden;
    }
    nav {
      display: flex;
      justify-content: center;
      padding: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    nav a {
      margin: 0 20px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.3s;
    }
    nav a:hover {
      color: #1E90FF;
    }
    nav a.active {
      color: #1E90FF;
    }
    .content {
      flex: 1;
      padding: 20px;
      text-align: left;
      overflow-y: auto;
    }
    section {
      display: none;
      min-height: 100%;
    }
    section.active {
      display: block;
    }

    /* 📌 Contact Section */
    .contact-container {
      display: flex;
      gap: 40px;
    }
    .contact-left, .contact-right {
      flex: 1;
    }
    .contact-left h2,
    .contact-right h2 {
      border-bottom: 1px solid rgba(255,255,255,0.2); /* ✅ 白色细线 */
      padding-bottom: 5px;
      margin-bottom: 15px;
    }
    .contact-left .contact-item {
      margin: 15px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .contact-left a {
      color: white;
      text-decoration: none;
    }
    .contact-left a:hover {
      color: #1E90FF;
    }

    .contact-right form {
      display: flex;
      flex-direction: column;
    }
    .contact-right label {
      margin-top: 10px;
      margin-bottom: 5px;
      font-weight: bold;
    }
    .contact-right input,
    .contact-right textarea {
      padding: 10px;
      background: transparent;
      border: 1px solid #fff;
      border-radius: 6px;
      color: #fff;
    }
    .g-recaptcha {
      margin-top: 15px; /* ✅ 防止和输入框重合 */
    }
    .contact-right button {
      margin-top: 15px;
      padding: 10px;
      background: transparent;
      border: 1px solid white;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }
    .contact-right button:hover {
      border-color: #1E90FF;
      color: #1E90FF;
    }
    #status-message {
      margin-top: 10px;
      font-size: 14px;
    }
    #status-message.success {
      color: #4CAF50; /* ✅ 绿色 */
    }
    #status-message.error {
      color: #FF4C4C; /* ✅ 红色 */
    }

    @media (max-width: 768px) {
      .contact-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="glass">
    <nav>
      <a class="active" data-page="about">About Me</a>
      <a data-page="project">Project</a>
      <a data-page="contact">Contact</a>
    </nav>

    <div class="content">
      <section id="about" class="active">
        <h1>Welcome to My Personal Website</h1>
        <p>
          I am a Computer Science student at the University of Waterloo, passionate about algorithms and project development.  
          <br>
          <strong>This is modification #22 (fixed contact)</strong>
        </p>
      </section>

      <section id="project">
        <p>[Timeline 保持不变，这里省略]</p>
      </section>

      <section id="contact">
        <div class="contact-container">
          <div class="contact-left">
            <h2>Contact</h2>
            <div class="contact-item"><i class="fas fa-phone"></i><span>+1 (123) 456-7890</span></div>
            <div class="contact-item"><i class="fas fa-envelope"></i><a href="mailto:kaius.jin@outlook.com">ka
