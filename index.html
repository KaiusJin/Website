<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人网站</title>
  <!-- Font Awesome 图标库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function(){
      emailjs.init("Weh_j8K9Bgk4BrZFl"); // 你的 Public Key
    })();
  </script>
  <style>
    body {
      margin: 0;
      height: 100%;
      background-color: #1E1E1E;
      background-image: url('./'); /* 可以换成背景图 */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      color: #fff;
    }
    .glass {
      position: absolute;
      top: 35px;
      bottom: 35px;
      left: 50px;
      right: 50px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 35px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      justify-content: center;
      padding: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    nav a {
      margin: 0 20px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.3s;
    }
    nav a:hover {
      color: #1E90FF;
    }
    nav a.active {
      color: #1E90FF;
    }
    .content {
      flex: 1;
      padding: 40px;
      text-align: left;
    }
    section {
      display: none;
      height: 100%;
    }
    section.active {
      display: block;
    }
    /* Contact 样式 */
    .contact-container {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      gap: 40px;
      height: 100%;
    }
    .contact-left {
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex: 1;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 18px;
      cursor: pointer;
    }
    .contact-item i {
      font-size: 22px;
      color: #fff;
      width: 30px;
      text-align: center;
      transition: color 0.3s;
    }
    .contact-item a, .contact-item span {
      color: #fff;
      text-decoration: none;
      transition: color 0.3s;
    }
    .contact-item:hover i,
    .contact-item:hover a,
    .contact-item:hover span {
      color: #1E90FF;
    }
    /* Download CV 按钮 */
    .download-btn {
      display: inline-block;
      padding: 10px 20px;
      border: 2px solid #fff;
      color: #fff;
      background: transparent;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s;
    }
    .download-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #1E90FF;
      border-color: #1E90FF;
    }
    /* 右侧表单 */
    .contact-right {
      flex: 2;
      display: flex;
      justify-content: flex-end;
    }
    .contact-right form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 400px;
    }
    .contact-right input,
    .contact-right textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
    .contact-right button {
      padding: 10px;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .contact-right button:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #1E90FF;
      border-color: #1E90FF;
    }
  </style>
</head>
<body>
  <div class="glass">
    <!-- 顶部导航栏 -->
    <nav>
      <a class="active" data-page="about">About Me</a>
      <a data-page="project">Project</a>
      <a data-page="contact">Contact</a>
    </nav>

    <!-- 页面内容 -->
    <div class="content">
      <section id="about" class="active">
        <h1>欢迎来到我的个人网站</h1>
        <p>
          我是滑铁卢大学计算机科学专业的学生，热爱算法与项目开发。  
          <br>
          <strong>这是第 6 次修改</strong>
        </p>
      </section>

      <section id="project">
        <h2>项目展示</h2>
        <p>这里可以放你的项目列表，比如在线考试系统、个人网站、RateMyProfessor 应用等。</p>
      </section>

      <section id="contact">
        <h2>联系方式</h2>
        <div class="contact-container">
          <!-- 左侧联系方式 -->
          <div class="contact-left">
            <div class="contact-item">
              <i class="fas fa-phone"></i>
              <span>+1 (123) 456-7890</span>
            </div>
            <div class="contact-item">
              <i class="fas fa-envelope"></i>
              <a href="mailto:kaius.jin@outlook.com">kaius.jin@outlook.com</a>
            </div>
            <div class="contact-item">
              <i class="fab fa-linkedin"></i>
              <a href="https://www.linkedin.com/in/kaixuan-jin/" target="_blank">LinkedIn</a>
            </div>
            <div class="contact-item">
              <i class="fab fa-github"></i>
              <a href="https://github.com/KaiusJin" target="_blank">GitHub</a>
            </div>
            <a href="CV.pdf" download class="download-btn">📄 Download CV</a>
          </div>

          <!-- 右侧 EmailJS 表单 -->
          <div class="contact-right">
            <form id="contact-form">
              <label>姓名</label>
              <input type="text" name="from_name" required>

              <label>邮箱</label>
              <input type="email" name="from_email" required>

              <label>留言</label>
              <textarea name="message" rows="6" required></textarea>

              <button type="submit">发送</button>
            </form>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    // Tab 切换逻辑
    const navLinks = document.querySelectorAll('nav a');
    const sections = document.querySelectorAll('section');

    navLinks.forEach(link => {
      link.addEventListener('click', () => {
        navLinks.forEach(l => l.classList.remove('active'));
        sections.forEach(s => s.classList.remove('active'));

        link.classList.add('active');
        document.getElementById(link.dataset.page).classList.add('active');
      });
    });

    // EmailJS 表单提交逻辑
    document.getElementById('contact-form').addEventListener('submit', function(event) {
      event.preventDefault();

      emailjs.sendForm('service_o5dzskj', 'template_d8tjykx', this)
        .then(function() {
          alert('消息已发送！我会尽快回复你。');
        }, function(error) {
          alert('发送失败，请稍后重试。');
          console.error('FAILED...', error);
        });
    });
  </script>
</body>
</html>
