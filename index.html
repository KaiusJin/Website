<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人网站</title>
  <!-- Font Awesome 图标库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      height: 100%;
      background-color: #1E1E1E;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      color: #fff;
    }
    .glass {
      position: absolute;
      top: 35px;
      bottom: 35px;
      left: 50px;
      right: 50px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 35px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      justify-content: center;
      padding: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    nav a {
      margin: 0 20px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.3s;
    }
    nav a:hover {
      color: #1E90FF;
    }
    nav a.active {
      color: #1E90FF;
    }
    .content {
      flex: 1;
      padding: 40px;
      text-align: left;
    }
    section {
      display: none;
    }
    section.active {
      display: block;
    }
    /* Contact 样式 */
    .contact-container {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 18px;
      cursor: pointer;
    }
    .contact-item i {
      font-size: 22px;
      color: #fff;
      width: 30px;
      text-align: center;
      transition: color 0.3s;
    }
    .contact-item a, .contact-item span {
      color: #fff;
      text-decoration: none;
      transition: color 0.3s;
    }
    .contact-item:hover i,
    .contact-item:hover a,
    .contact-item:hover span {
      color: #1E90FF;
    }
    /* Download CV 按钮 */
    .download-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 10px 20px;
      background: #1E90FF;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
    }
    .download-btn:hover {
      background: #0066CC;
    }
  </style>
</head>
<body>
  <div class="glass">
    <!-- 顶部导航栏 -->
    <nav>
      <a class="active" data-page="about">About Me</a>
      <a data-page="project">Project</a>
      <a data-page="contact">Contact</a>
    </nav>

    <!-- 页面内容 -->
    <div class="content">
      <section id="about" class="active">
        <h1>欢迎来到我的个人网站</h1>
        <p>
          我是滑铁卢大学计算机科学专业的学生，热爱算法与项目开发。  
          <br>
          <strong>这是第 1 次修改</strong>
        </p>
      </section>

      <section id="project">
        <h2>项目展示</h2>
        <p>这里可以放你的项目列表，比如在线考试系统、个人网站、RateMyProfessor 应用等。</p>
      </section>

      <section id="contact">
        <h2>联系方式</h2>
        <div class="contact-container">
          <div class="contact-item">
            <i class="fas fa-phone"></i>
            <span>+1 (123) 456-7890</span>
          </div>
          <div class="contact-item">
            <i class="fas fa-envelope"></i>
            <a href="mailto:kaius.jin@outlook.com">kaius.jin@outlook.com</a>
          </div>
          <div class="contact-item">
            <i class="fab fa-linkedin"></i>
            <a href="https://www.linkedin.com/in/kaixuan-jin/" target="_blank">LinkedIn</a>
          </div>
          <div class="contact-item">
            <i class="fab fa-github"></i>
            <a href="https://github.com/KaiusJin" target="_blank">GitHub</a>
          </div>
        </div>

        <!-- Download CV 按钮 -->
        <a href="cv.pdf" download class="download-btn">📄 Download CV</a>
      </section>
    </div>
  </div>

  <script>
    // Tab 切换逻辑
    const navLinks = document.querySelectorAll('nav a');
    const sections = document.querySelectorAll('section');

    navLinks.forEach(link => {
      link.addEventListener('click', () => {
        navLinks.forEach(l => l.classList.remove('active'));
        sections.forEach(s => s.classList.remove('active'));

        link.classList.add('active');
        document.getElementById(link.dataset.page).classList.add('active');
      });
    });
  </script>
</body>
</html>
